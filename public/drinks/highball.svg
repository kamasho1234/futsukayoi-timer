<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1810"/><stop offset="100%" stop-color="#100e08"/></linearGradient>
    <linearGradient id="hb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8c44a"/><stop offset="100%" stop-color="#c49520"/></linearGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Tall glass -->
  <path d="M40 20 L43 98 Q43 100 46 100 L74 100 Q77 100 77 98 L80 20 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Liquid -->
  <path d="M43 40 L45 96 Q45 98 48 98 L72 98 Q75 98 75 96 L77 40 Z" fill="url(#hb)" opacity="0.5"/>
  <!-- Ice cubes -->
  <rect x="48" y="42" width="12" height="10" rx="2" fill="rgba(255,255,255,0.15)" transform="rotate(-8 54 47)"/>
  <rect x="62" y="45" width="10" height="9" rx="2" fill="rgba(255,255,255,0.12)" transform="rotate(5 67 49)"/>
  <rect x="52" y="55" width="11" height="9" rx="2" fill="rgba(255,255,255,0.1)" transform="rotate(-3 57 59)"/>
  <!-- Bubbles -->
  <circle cx="55" cy="75" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="62" cy="82" r="1.3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="58" cy="90" r="0.8" fill="rgba(255,255,255,0.15)"/>
  <!-- Lemon slice -->
  <circle cx="78" cy="25" r="10" fill="#e8c44a" opacity="0.7"/>
  <circle cx="78" cy="25" r="7" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="78" y1="18" x2="78" y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <line x1="71" y1="25" x2="85" y2="25" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
</svg>
