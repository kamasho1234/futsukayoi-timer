<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0a0a"/><stop offset="100%" stop-color="#120606"/></linearGradient>
    <linearGradient id="st" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e04040"/><stop offset="100%" stop-color="#a02020"/></linearGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>
  <!-- Can body -->
  <rect x="35" y="20" width="50" height="80" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(200,50,50,0.3)" stroke-width="1.5"/>
  <!-- Can top -->
  <rect x="38" y="20" width="44" height="8" rx="3" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="60" cy="24" rx="6" ry="2.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Label - red -->
  <rect x="38" y="38" width="44" height="50" rx="2" fill="url(#st)" opacity="0.35"/>
  <!-- STRONG text -->
  <text x="60" y="66" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10" font-weight="bold" font-family="sans-serif">STRONG</text>
  <!-- 9% -->
  <text x="60" y="80" text-anchor="middle" fill="rgba(255,200,200,0.5)" font-size="14" font-weight="bold" font-family="sans-serif">9%</text>
</svg>
